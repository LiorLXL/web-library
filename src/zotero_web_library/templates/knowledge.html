<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ library.name }} - 知识库</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body data-knowledge-page data-library-id="{{ library.library_id }}">
  <aside class="rail">
    <a class="rail-logo" href="{{ url_for('index') }}">ZW</a>
    <a class="rail-btn" title="多源检索" href="{{ url_for('features_page', library_id=library.library_id) }}">检</a>
    <a class="rail-btn" title="文库" href="{{ url_for('library_page', library_id=library.library_id) }}">库</a>
    <a class="rail-btn active" title="知识库" href="{{ url_for('knowledge_page', library_id=library.library_id) }}">知</a>
    <a class="rail-btn" title="文献研读" href="{{ url_for('reader_page', library_id=library.library_id) }}">读</a>

    <a class="rail-btn" title="API 配置" href="{{ url_for('api_config_page', library_id=library.library_id) }}">配</a>
  </aside>
  <main class="workspace app-page-shell">
    <header class="topbar">
      <div class="topbar-meta">
        <h1>知识库</h1>
        <p>围绕知识库条目、文献矩阵字段与智能体对话组织标准化资产工作台。</p>
      </div>
      <div class="topbar-actions">
        <span class="mode-pill">{{ library.name }}</span>
        <span class="mode-pill">界面占位版</span>
        <button class="ghost-btn" type="button" data-rag-index-library>刷新 RAG 索引</button>
        <a class="nav-action-btn" href="{{ url_for('library_page', library_id=library.library_id) }}">返回文库</a>
      </div>
    </header>

    <section class="knowledge-workbench" data-knowledge-workbench>
      <aside class="knowledge-sidebar">
        <div class="workbench-panel-head workbench-sidebar-head">
          <h2>知识库列表</h2>
          <button type="button" class="workbench-collapse-btn" data-toggle-knowledge-sidebar title="折叠列表" aria-label="折叠列表">◀</button>
        </div>
        <div class="workbench-panel-body">
          <div class="knowledge-sidebar-actions">
            <button type="button" class="ghost-btn knowledge-create-btn" data-knowledge-placeholder-action="create">新建知识库</button>
            <button type="button" class="danger-btn knowledge-delete-btn" data-delete-knowledge-base>删除知识库</button>
          </div>
          <div class="compact-list" data-knowledge-list></div>
        </div>
      </aside>

      <div class="workbench-splitter" data-knowledge-splitter="left" title="拖拽调整宽度"></div>

      <section class="knowledge-matrix-panel">
        <div class="workbench-panel-head matrix-panel-head">
          <div>
            <h2>文献矩阵</h2>
            <p data-knowledge-current-title>当前知识库的字段设置与矩阵表格展示。</p>
          </div>
          <div class="matrix-actions">
            <button class="ghost-btn small" type="button" data-add-matrix-field>新增字段</button>
            <button class="ghost-btn small" type="button" data-recommend-matrix-fields>AI 推荐字段</button>
            <button class="ghost-btn small" type="button" data-save-matrix-fields>保存字段</button>
            <button class="ghost-btn small matrix-run-btn" type="button" data-run-reading-matrix aria-label="运行文献矩阵" title="运行文献矩阵">运行</button>
            <button class="ghost-btn small matrix-stop-btn" type="button" data-stop-reading-matrix hidden aria-label="停止文献矩阵" title="停止文献矩阵">停止</button>
          </div>
        </div>
        <div class="knowledge-matrix-body">
          <div class="matrix-field-list" data-matrix-field-list></div>
          <div class="matrix-status" data-reading-matrix-status>
            <span>当前仅提供知识库界面骨架，后续再接入真实导入、字段保存和矩阵生成。</span>
          </div>
          <div class="knowledge-search-panel" data-knowledge-search-panel></div>
          <div class="matrix-table-card">
            <div class="matrix-table-head">
              <strong>矩阵表格</strong>
              <span>列为名称 + 当前启用的文献矩阵字段</span>
            </div>
            <div class="matrix-table-wrap">
              <table class="matrix-table" data-knowledge-matrix-table>
                <thead data-knowledge-matrix-head></thead>
                <tbody data-knowledge-matrix-body></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      <div class="workbench-splitter" data-knowledge-splitter="right" title="拖拽调整宽度"></div>

      <aside class="knowledge-agent">
        <div class="workbench-panel-head">
          <h2>智能体对话</h2>
        </div>
        <div class="workbench-panel-body knowledge-agent-body">
          <div class="knowledge-chat-messages" data-knowledge-chat-messages></div>
          <textarea rows="6" class="knowledge-chat-input" placeholder="围绕当前知识库、矩阵字段或勾选条目继续提问。"></textarea>
          <div class="knowledge-chat-actions">
            <button type="button" class="ghost-btn" data-knowledge-placeholder-action="compress">压缩记忆</button>
            <button type="button" class="form-action-btn" data-knowledge-placeholder-action="send">发送任务</button>
          </div>
          <p class="inline-status-copy" data-knowledge-chat-status>围绕当前知识库条目、矩阵字段与解析资产继续提问。</p>
        </div>
      </aside>
    </section>
  </main>
  <script src="{{ url_for('static', filename='knowledge.js') }}"></script>
</body>
</html>
