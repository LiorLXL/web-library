<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ library.name }} - API 配置</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body data-api-config-page data-library-id="{{ library.library_id }}">
  <aside class="rail">
    <a class="rail-logo" href="{{ url_for('index') }}">ZW</a>
    <a class="rail-btn" title="多源检索" href="{{ url_for('features_page', library_id=library.library_id) }}">检</a>
    <a class="rail-btn" title="文库" href="{{ url_for('library_page', library_id=library.library_id) }}">库</a>
    <a class="rail-btn" title="知识库" href="{{ url_for('knowledge_page', library_id=library.library_id) }}">知</a>
    <a class="rail-btn" title="文献研读" href="{{ url_for('reader_page', library_id=library.library_id) }}">读</a>

    <a class="rail-btn active" title="API 配置" href="{{ url_for('api_config_page', library_id=library.library_id) }}">配</a>
  </aside>
  <main class="workspace api-config-workspace">
    <header class="topbar">
      <div class="topbar-meta">
        <h1>API 配置</h1>
        <p>当前文库：{{ library.name }}。这里配置模型和代码/数据源 token。</p>
      </div>
      <div class="topbar-actions">
        <a class="nav-action-btn" href="{{ url_for('features_page', library_id=library.library_id) }}">多源检索</a>
        <a class="nav-action-btn" href="{{ url_for('library_page', library_id=library.library_id) }}">返回文库</a>
      </div>
    </header>
    <section class="api-config-shell" data-api-config-panel>
      <p class="empty-state">正在加载 API 配置...</p>
    </section>
  </main>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
